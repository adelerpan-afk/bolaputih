        `;
        const sphereFragmentShader = `
            varying vec3 v_viewNormal;
            varying vec3 v_viewPosition;
            varying vec3 v_worldPosition;
            varying vec2 v_uv;

            uniform vec3 u_lightPosition;
            uniform sampler2D u_sceneTexture;
            uniform vec2 u_resolution;
            uniform mat4 projectionMatrix;
            uniform sampler2D u_matcap;

            uniform sampler2D directionalShadowMap[ 1 ];
            varying vec4 vDirectionalShadowCoord[ 1 ];

            struct DirectionalLightShadow {
                float shadowBias;
                float shadowNormalBias;
                float shadowRadius;
                vec2 shadowMapSize;
            };
            uniform DirectionalLightShadow directionalLightShadows[ 1 ];

            vec3 inverseTransformDirection( in vec3 dir, in mat4 matrix ) {
                return normalize( ( vec4( dir, 0.0 ) * matrix ).xyz );
            }

            #include <packing>

            float texture2DCompare( sampler2D depths, vec2 uv, float compare ) {
                return step( compare, unpackRGBAToDepth( texture2D( depths, uv ) ) );
            }

            float getShadow( sampler2D shadowMap, vec2 shadowMapSize, float shadowBias, float shadowRadius, vec4 shadowCoord ) {
                float shadow = 1.0;

                shadowCoord.xyz /= shadowCoord.w;
                shadowCoord.z += shadowBias;

                bvec4 inFrustumVec = bvec4 ( shadowCoord.x >= 0.0, shadowCoord.x <= 1.0, shadowCoord.y >= 0.0, shadowCoord.y <= 1.0 );
                bool inFrustum = all( inFrustumVec );

                bvec2 frustumTestVec = bvec2( inFrustum, shadowCoord.z <= 1.0 );

                bool frustumTest = all( frustumTestVec );

                if ( frustumTest ) {
                    vec2 texelSize = vec2( 1.0 ) / shadowMapSize;

                    float dx0 = - texelSize.x * shadowRadius;
                    float dy0 = - texelSize.y * shadowRadius;
                    float dx1 = + texelSize.x * shadowRadius;
                    float dy1 = + texelSize.y * shadowRadius;
                    float dx2 = dx0 / 2.0;
                    float dy2 = dy0 / 2.0;
                    float dx3 = dx1 / 2.0;
                    float dy3 = dy1 / 2.0;

                    shadow = (
                        texture2DCompare( shadowMap, shadowCoord.xy + vec2( dx0, dy0 ), shadowCoord.z ) +
                        texture2DCompare( shadowMap, shadowCoord.xy + vec2( 0.0, dy0 ), shadowCoord.z ) +
                        texture2DCompare( shadowMap, shadowCoord.xy + vec2( dx1, dy0 ), shadowCoord.z ) +
                        texture2DCompare( shadowMap, shadowCoord.xy + vec2( dx2, dy2 ), shadowCoord.z ) +
                        texture2DCompare( shadowMap, shadowCoord.xy + vec2( 0.0, dy2 ), shadowCoord.z ) +
                        texture2DCompare( shadowMap, shadowCoord.xy + vec2( dx3, dy2 ), shadowCoord.z ) +
                        texture2DCompare( shadowMap, shadowCoord.xy + vec2( dx0, 0.0 ), shadowCoord.z ) +
                        texture2DCompare( shadowMap, shadowCoord.xy + vec2( dx2, 0.0 ), shadowCoord.z ) +
                        texture2DCompare( shadowMap, shadowCoord.xy, shadowCoord.z ) +
                        texture2DCompare( shadowMap, shadowCoord.xy + vec2( dx3, 0.0 ), shadowCoord.z ) +
                        texture2DCompare( shadowMap, shadowCoord.xy + vec2( dx1, 0.0 ), shadowCoord.z ) +
                        texture2DCompare( shadowMap, shadowCoord.xy + vec2( dx2, dy3 ), shadowCoord.z ) +
                        texture2DCompare( shadowMap, shadowCoord.xy + vec2( 0.0, dy3 ), shadowCoord.z ) +
                        texture2DCompare( shadowMap, shadowCoord.xy + vec2( dx3, dy3 ), shadowCoord.z ) +
                        texture2DCompare( shadowMap, shadowCoord.xy + vec2( dx0, dy1 ), shadowCoord.z ) +
                        texture2DCompare( shadowMap, shadowCoord.xy + vec2( 0.0, dy1 ), shadowCoord.z ) +
                        texture2DCompare( shadowMap, shadowCoord.xy + vec2( dx1, dy1 ), shadowCoord.z )
                    ) * ( 1.0 / 17.0 );
                }

                return shadow;
            }

            float getShadowMask() {
                float shadow = 1.0;
                vec3 blueNoise = vec3(0.0);
                DirectionalLightShadow directionalLight = directionalLightShadows[0];
                shadow *= getShadow( directionalShadowMap[0], directionalLight.shadowMapSize, directionalLight.shadowBias - blueNoise.z * 0.002, directionalLight.shadowRadius, vDirectionalShadowCoord[0] + vec4(blueNoise.xy / directionalLight.shadowMapSize, 0.0, 0.0));
                return shadow;
            }

            void main() {
                vec3 viewNormal = normalize(v_viewNormal);

                vec3 N = inverseTransformDirection(viewNormal, viewMatrix); // normal in world space
                vec3 V = normalize(cameraPosition - v_worldPosition); // view direction
                vec3 L = u_lightPosition - v_worldPosition; // light direction
                float lightDistance = length(L);
                L /= lightDistance;

                float NdL = max(0., dot(N, L));

                vec3 H = normalize(V + L);
                float spec = max(0.0, dot(H, N));
                float NdV = max(0., dot(N, V));
                float fresnel = pow(1.0 - NdV, 5.0);
                
                float thickness = 0.6;
                float ior = 1.45; // ice ior
                float refractionRatio = 1.0 / ior;
                vec3 refractionVector = refract( -V, N, refractionRatio );
                
                vec3 transmissionRay = normalize( refractionVector ) * thickness;
                vec3 refractedRayExit = v_worldPosition + transmissionRay;
                
                vec4 ndcPos = projectionMatrix * viewMatrix * vec4( refractedRayExit, 1.0 );
                vec2 refractionCoords = ndcPos.xy / ndcPos.w;
                refractionCoords += 1.0;
                refractionCoords /= 2.0;
                
                vec3 sceneBlurred = pow(texture2D(u_sceneTexture, refractionCoords).rgb, vec3(2.2));

                vec3 viewDir = normalize( v_viewPosition );
                vec3 x = normalize( vec3( viewDir.z, 0.0, - viewDir.x ) );
                vec3 y = cross( viewDir, x );
                vec2 uv = vec2( dot( x, v_viewNormal ), dot( y, v_viewNormal ) ) * 0.495 + 0.5;
                vec4 matcapColor = texture2D( u_matcap, uv );
                
                float shadow = getShadowMask();
                
                vec3 color = sceneBlurred;
                color += shadow * 0.2 * pow(spec, 500.0);
                color += (0.1 + 0.9 * shadow) * 0.03 * pow(matcapColor.rgb, vec3(2.2));
                color += shadow * 0.005 * fresnel;

                gl_FragColor = vec4(0.8 * color, 1.);
                gl_FragColor.rgb = pow(gl_FragColor.rgb, vec3(1.0 / 2.2));
            }
        `;

            uniform float u_time;
            uniform vec3 u_sphere1Position;
            uniform vec3 u_sphere2Position;
            uniform vec3 u_sphere3Position;
            uniform vec3 u_sphere4Position;
            
            #define saturate( a ) clamp( a, 0.0, 1.0 )

            float linearStep(float edge0, float edge1, float x) {
                return clamp((x - edge0) / (edge1 - edge0), 0.0, 1.0);
            }

            const float PI = 3.1415654;

            vec3 rotateByQuaternion(vec3 v, vec4 q) {
                return v + 2.0 * cross(q.xyz, cross(q.xyz, v) + q.w * v);
            }

            vec3 inverseTransformDirection(in vec3 dir, in mat4 matrix) {
                return normalize((vec4(dir, 0.0) * matrix).xyz);
            }

            void main() {
                vec3 pos = position;
                vec3 norm = normal;

                float distanceToSphere1 = length(a_instancePos - u_sphere1Position);
                float distanceToSphere2 = length(a_instancePos - u_sphere2Position);
                float distanceToSphere3 = length(a_instancePos - u_sphere3Position);
                float distanceToSphere4 = length(a_instancePos - u_sphere4Position);
                
                float attenuationStrength = 4.0;

                float displacement = 1.0 - clamp(1.0 / (attenuationStrength * distanceToSphere1 * distanceToSphere1), 0.0, 1.0);
                displacement = min(displacement, 1.0 - clamp(1.0 / (attenuationStrength * distanceToSphere2 * distanceToSphere2), 0.0, 1.0));
                displacement = min(displacement, 1.0 - clamp(1.0 / (attenuationStrength * distanceToSphere3 * distanceToSphere3), 0.0, 1.0));
                displacement = min(displacement, 1.0 - clamp(1.0 / (attenuationStrength * distanceToSphere4 * distanceToSphere4), 0.0, 1.0));
                
                float tip = 1.0 - step(-2.5, pos.y);
                if (tip > 0.5) {
                    pos.y = -2.5;
                    norm = vec3(0, -1, 0);
                }

                pos = rotateByQuaternion(pos, a_instanceQuaternions);
                pos *= u_scale;
                pos += a_instancePos;
                pos += normalize(a_instancePos) * 0.4 * pow(displacement, 0.7);
                
                norm = rotateByQuaternion(norm, a_instanceQuaternions);

                vec4 viewPosition = modelViewMatrix * vec4(pos, 1.0);

                gl_Position = projectionMatrix * viewPosition;

                #else
                    vec4 worldPosition = (modelMatrix * vec4(pos, 1.0));

                    v_uv = uv;
                    v_viewNormal = normalize(normalMatrix * norm);
                    v_worldPosition = worldPosition.xyz;
                    v_modelPosition = position;
                    v_viewPosition = -viewPosition.xyz;
                    v_instancePos = a_instancePos;
                    v_worldNormal = inverseTransformDirection(v_viewNormal, viewMatrix);

                    vDirectionalShadowCoord[0] = directionalShadowMatrix[0] * worldPosition + vec4(v_worldNormal * directionalLightShadows[0].shadowNormalBias, 0. );
                #endif
            }
        `;

            }

            vec3 getBlueNoise (vec2 coord) {
                return texture2D(u_noiseTexture, coord * u_noiseTexelSize + u_noiseCoordOffset).rgb;
            }

            float getShadowMask() {

                shadow *= getShadow( directionalShadowMap[0], directionalLight.shadowMapSize, directionalLight.shadowBias - blueNoise.z * 0.002, directionalLight.shadowRadius, vDirectionalShadowCoord[0] + vec4(blueNoise.xy / directionalLight.shadowMapSize, 0.0, 0.0));

            void main() {

                color *= shadow;

                gl_FragColor = vec4(color, 1.0);
                gl_FragColor.rgb = pow(gl_FragColor.rgb, vec3(1.0 / 2.2));
            }

        // ============================================================
        //  KONSTANTA

        const INSTANCES_COUNT = 3000;
        const lightPosition = new THREE.Vector3(-1, 0.8, 0.25).normalize().multiplyScalar(5);

        // ============================================================
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 30);
        camera.position.set(0, 0, 5);

        const renderer = new THREE.WebGLRenderer({
            antialias: false,
            powerPreference: 'high-performance',
            stencil: false,
            alpha: false,
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 1;
        controls.maxDistance = 15;
        controls.target.set(0, 0, 0);

        // ============================================================
        //  POSTPROCESSING
        // ============================================================
        const composer = new EffectComposer(renderer, {
            multisampling: 0,
            antialias: false,
            alpha: false,
        });
        composer.addPass(new RenderPass(scene, camera));

        const bloom = new BloomEffect({
            mipmapBlur: true,
            luminanceThreshold: 0.65,
            luminanceSmoothing: 0.01,
            intensity: 2,
            kernelSize: KernelSize.MEDIUM,
            resolutionScale: 0.5,
            resolutionX: Resolution.AUTO_SIZE,
            resolutionY: Resolution.AUTO_SIZE,
            width: Resolution.AUTO_SIZE,
            height: Resolution.AUTO_SIZE,
        });
        const vignette = new VignetteEffect({
            darkness: 0.6,
            offset: 0.3,
        });
        composer.addPass(new EffectPass(camera, new SMAAEffect()));
        composer.addPass(new EffectPass(camera, bloom));
        composer.addPass(new EffectPass(camera, vignette));

        // ============================================================
        //  LOAD TEXTURES
        // ============================================================
        const loader = new THREE.TextureLoader();
        const noiseTexture = loader.load('bnoise.png');
        noiseTexture.wrapS = THREE.RepeatWrapping;
        noiseTexture.wrapT = THREE.RepeatWrapping;
        const matcapTexture = loader.load('glass.png');

        // ============================================================
        //  LIGHTS
        // ============================================================
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.copy(lightPosition);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.left = -3;
        dirLight.shadow.camera.right = 3;
        dirLight.shadow.camera.top = 3;
        dirLight.shadow.camera.bottom = -3;
        dirLight.shadow.camera.near = 0.1;
        dirLight.shadow.camera.far = 20;
        dirLight.shadow.bias = -0.0001;
        scene.add(dirLight);

        // ============================================================
        //  BACKGROUND (gradien)
        // ============================================================
        const bgUniforms = {
            u_color0: { value: new THREE.Color('#AEB2B5') },
            u_color1: { value: new THREE.Color('#939A9D') },
        };
        const bgMat = new THREE.ShaderMaterial({
            vertexShader: `
                varying vec2 v_uv;
                void main() {
                    v_uv = position.xy * 0.5 + 0.5;
                    gl_Position = vec4(position.xy, 0.0, 1.0);
                }
            `,
            fragmentShader: `
                varying vec2 v_uv;
                uniform vec3 u_color0;
                uniform vec3 u_color1;
                void main() {
                    gl_FragColor = vec4(mix(u_color0, u_color1, v_uv.x), 1.0);
                }
            `,
            uniforms: bgUniforms,
            depthWrite: false,
            depthTest: false,
        });
        const bgMesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), bgMat);
        bgMesh.renderOrder = -2;
        scene.add(bgMesh);

        // ============================================================
        //  HERO GEOMETRY (Instanced)
        // ============================================================
        const refGeo = new THREE.CapsuleGeometry(1, 4, 4, 16);
        refGeo.computeBoundingBox();

        const heroGeo = new THREE.InstancedBufferGeometry();
        for (const key in refGeo.attributes) {
            heroGeo.setAttribute(key, refGeo.attributes[key]);
        }
        heroGeo.setIndex(refGeo.index);

        const posArray = new Float32Array(INSTANCES_COUNT * 3);
        const quatArray = new Float32Array(INSTANCES_COUNT * 4);
        const radius = 1.5;
        const goldenAngle = Math.PI * (3 - Math.sqrt(5));
        const up = new THREE.Vector3(0, 1, 0);
        const tempPos = new THREE.Vector3();
        const tempQuat = new THREE.Quaternion();

        for (let i = 0; i < INSTANCES_COUNT; i++) {
            const y = 1 - (i / (INSTANCES_COUNT - 1)) * 2;
            const r = Math.sqrt(1 - y * y);
            const theta = goldenAngle * i;
            const x = Math.cos(theta) * r * radius;
            const z = Math.sin(theta) * r * radius;
            const posY = y * radius;

            posArray[i * 3] = x;
            posArray[i * 3 + 1] = posY;
            posArray[i * 3 + 2] = z;

            tempPos.set(-x, -posY, -z).normalize();
            tempQuat.setFromUnitVectors(up, tempPos);
            quatArray[i * 4] = tempQuat.x;
            quatArray[i * 4 + 1] = tempQuat.y;
            quatArray[i * 4 + 2] = tempQuat.z;
            quatArray[i * 4 + 3] = tempQuat.w;
        }
        heroGeo.setAttribute('a_instancePos', new THREE.InstancedBufferAttribute(posArray, 3));
        heroGeo.setAttribute('a_instanceQuaternions', new THREE.InstancedBufferAttribute(quatArray, 4));

        // ============================================================
        //  HERO UNIFORMS
        // ============================================================
        const heroUniforms = {
            u_scale: { value: 0.06 },
            u_lightPosition: { value: lightPosition },
            u_noiseTexture: { value: noiseTexture },
            u_noiseTexelSize: { value: new THREE.Vector2(1 / 128, 1 / 128) },
            u_noiseCoordOffset: { value: new THREE.Vector2(0, 0) },
            u_color: { value: new THREE.Color('#B2B8BB') },
            u_sphere1Position: { value: new THREE.Vector3(0, 0, 0) },
            u_sphere2Position: { value: new THREE.Vector3(0, 0, 0) },
            u_sphere3Position: { value: new THREE.Vector3(0, 0, 0) },
            u_sphere4Position: { value: new THREE.Vector3(0, 0, 0) },
            ...THREE.UniformsUtils.merge([THREE.UniformsLib.lights]),
        };

        const heroMat = new THREE.ShaderMaterial({
            vertexShader: heroVertexShader,
            fragmentShader: heroFragmentShader,
            uniforms: heroUniforms,
            lights: true,
        });
        const heroDepthMat = new THREE.ShaderMaterial({
            vertexShader: heroVertexShader,
            fragmentShader: heroDepthFragmentShader,
            uniforms: heroUniforms,
            defines: { IS_DEPTH: true },
        });

        const heroMesh = new THREE.Mesh(heroGeo, heroMat);
        heroMesh.castShadow = true;
        heroMesh.receiveShadow = true;
        heroMesh.renderOrder = 0;
        heroMesh.customDepthMaterial = heroDepthMat;
        scene.add(heroMesh);

        // ============================================================
        //  DARK SPHERE (di bawah hero)
        // ============================================================
        const darkSphere = new THREE.Mesh(
            new THREE.SphereGeometry(1.5, 32, 32),
            new THREE.MeshBasicMaterial({ color: 0x111111 })
        );
        darkSphere.renderOrder = -1;
        scene.add(darkSphere);

        // ============================================================
        //  SPHERE GEOMETRY & MATERIAL (untuk 4 bola transparan)
        // ============================================================
        const sphereGeo = new THREE.SphereGeometry(0.3, 32, 32);
        const sphereUniforms = {
            u_lightPosition: { value: lightPosition },
            u_noiseTexture: { value: noiseTexture },
            u_sceneTexture: { value: null },
            u_resolution: { value: new THREE.Vector2() },
            u_matcap: { value: matcapTexture },
            ...THREE.UniformsUtils.merge([THREE.UniformsLib.lights]),
        };
        const sphereMat = new THREE.ShaderMaterial({
            vertexShader: sphereVertexShader,
            fragmentShader: sphereFragmentShader,
            uniforms: sphereUniforms,
            lights: true,
        });

        // ============================================================
        //  BLUR PASS & RENDER TARGET (untuk efek refraksi)
        // ============================================================
        const blurPass = new KawaseBlurPass({ kernelSize: KernelSize.VERY_SMALL });
        const blurRT = new THREE.WebGLRenderTarget(1, 1, { depthBuffer: false });
        blurRT.texture.minFilter = THREE.LinearFilter;
        blurRT.texture.magFilter = THREE.LinearFilter;

        let tempRT = null;

        function updateBlurSize() {
            const w = Math.floor(window.innerWidth / 2);
            const h = Math.floor(window.innerHeight / 2);
            const dpr = Math.min(window.devicePixelRatio, 1.5);
            const sw = w * dpr;
            const sh = h * dpr;
            blurRT.setSize(sw, sh);
            blurPass.setSize(sw, sh);
            sphereUniforms.u_resolution.value.set(sw, sh);
            if (tempRT) tempRT.dispose();
            tempRT = new THREE.WebGLRenderTarget(sw, sh, { depthBuffer: false });
            tempRT.texture.minFilter = THREE.LinearFilter;
            tempRT.texture.magFilter = THREE.LinearFilter;
        }
        updateBlurSize();
        window.addEventListener('resize', updateBlurSize);

        // ============================================================
        //  SPHERE MESHES (4 bola)
        // ============================================================
        const spheres = [];
        const configs = [
            { speed: 1.0, phase: Math.PI / 1.1, plane: 'yz', dir: 1 },
            { speed: 0.75, phase: Math.PI / 3.4, plane: 'xz', dir: -1 },
            { speed: 0.5, phase: Math.PI / 2.2, plane: 'yz', dir: 1 },
            { speed: 1.2, phase: Math.PI / 1.7, plane: 'xy', dir: -1 },
        ];
        const orbitRadius = 1.9;

        function orbitPosition(time, config) {
            const angle = config.dir * config.speed * time + config.phase;
            if (config.plane === 'xy') return new THREE.Vector3(Math.cos(angle) * orbitRadius, Math.sin(angle) * orbitRadius, 0);
            if (config.plane === 'xz') return new THREE.Vector3(Math.cos(angle) * orbitRadius, 0, Math.sin(angle) * orbitRadius);
            if (config.plane === 'yz') return new THREE.Vector3(0, Math.cos(angle) * orbitRadius, Math.sin(angle) * orbitRadius);
            return new THREE.Vector3(Math.cos(angle) * orbitRadius, Math.sin(angle) * orbitRadius, 0);
        }

        for (let i = 0; i < 4; i++) {
            const mesh = new THREE.Mesh(sphereGeo, sphereMat);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.renderOrder = 1;
            scene.add(mesh);
            spheres.push(mesh);
        }

        // ============================================================
        //  FLOOR (hanya untuk bayangan)
        // ============================================================
        const floorUniforms = {
            u_noiseTexture: { value: noiseTexture },
            u_noiseTexelSize: { value: new THREE.Vector2(1 / 128, 1 / 128) },
            u_noiseCoordOffset: { value: new THREE.Vector2(0, 0) },
            ...THREE.UniformsUtils.merge([THREE.UniformsLib.lights]),
        };
        const floorMat = new THREE.ShaderMaterial({
            vertexShader: floorVertexShader,
            fragmentShader: floorFragmentShader,
            uniforms: floorUniforms,
            lights: true,
            transparent: true,
        });
        const floorMesh = new THREE.Mesh(new THREE.PlaneGeometry(8, 8), floorMat);
        floorMesh.rotation.x = -Math.PI / 2;
        floorMesh.position.set(4, -3, -1.5);
        floorMesh.receiveShadow = true;
        scene.add(floorMesh);

        // ============================================================
        //  ANIMASI & RENDER LOOP
        // ============================================================
        const clock = new THREE.Clock();

        function animate() {
            const elapsed = clock.getElapsedTime();

            // Update posisi spheres
            const positions = configs.map(cfg => orbitPosition(elapsed, cfg));
            spheres.forEach((mesh, i) => {
                const pos = positions[i];
                mesh.position.copy(pos);
                const key = `u_sphere${i + 1}Position`;
                heroUniforms[key].value.copy(pos);
            });

            // Offset noise
            heroUniforms.u_noiseCoordOffset.value.set(Math.random(), Math.random());
            floorUniforms.u_noiseCoordOffset.value.set(Math.random(), Math.random());

            // Update matcap di sphere uniform
            sphereUniforms.u_matcap.value = matcapTexture;

            // ---- BLUR UNTUK REFRAKSI ----
            // 1. Render scene mentah (tanpa postprocessing) ke blurRT
            renderer.setRenderTarget(blurRT);
            renderer.render(scene, camera);

            // 2. Blur dari blurRT ke tempRT
            blurPass.render(renderer, blurRT, tempRT);

            // 3. Gunakan texture hasil blur sebagai u_sceneTexture
            sphereUniforms.u_sceneTexture.value = tempRT.texture;

            // Kembali ke default framebuffer
            renderer.setRenderTarget(null);

            // 4. Render composer (dengan bloom, vignette)
            composer.render();

            controls.update();
            requestAnimationFrame(animate);
        }

        animate();

        // ============================================================
        //  RESIZE HANDLER
        // ============================================================
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            composer.setSize(w, h);
            updateBlurSize();
        });

        console.log('✅ Vanilla Three.js Hero siap!');
    </script>
</body>
</html>
